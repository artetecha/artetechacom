applications:
    app:
        source:
            root: "app"

        type: "nodejs:22"

        build:
            flavor: none

        hooks:
            build: |
                set -e
                npm ci
                npm run build

        web:
            # nginx serves every real static file directly; the tiny start
            # process below only ever receives genuine misses (passthru: true),
            # which it answers with the branded 404 page and a real 404 status.
            upstream:
                socket_family: tcp
            commands:
                start: "node server.mjs"
            locations:
                "/":
                    root: "dist"
                    index:
                        - "index.html"
                    # Forward misses to the 404 handler (real 404 status).
                    passthru: true
                    expires: 10m
                    scripts: false
                    allow: true
                "/_astro":
                    # Content-hashed build assets: cache forever.
                    root: "dist/_astro"
                    passthru: true
                    expires: 1y
                    scripts: false
                    allow: true

routes:
    "https://www.{default}/":
        type: upstream
        upstream: "app:http"
        cache:
            enabled: true
            # Fully static site: no cookie should ever vary the cache.
            cookies: []
        redirects:
            expires: 1y
            paths:
                # --- legacy WordPress URLs ---------------------------------
                # Section pages of the old consultancy site.
                '^/company/?$':
                    to: "https://www.{default}/about/"
                    regexp: true
                    code: 301
                '^/projects/?$':
                    to: "https://www.{default}/work/"
                    regexp: true
                    code: 301
                '^/blog(/page/[0-9]+)?/?$':
                    to: "https://www.{default}/writing/"
                    regexp: true
                    code: 301
                '^/(drupal|wordpress|agile|pantheon-silver-partner)/?$':
                    to: "https://www.{default}/work/"
                    regexp: true
                    code: 301
                '^/category/[a-z0-9-]+/?$':
                    to: "https://www.{default}/writing/archive/"
                    regexp: true
                    code: 301
                '^/author/[a-z0-9-]+/?$':
                    to: "https://www.{default}/about/"
                    regexp: true
                    code: 301
                '^/feed/?$':
                    to: "https://www.{default}/rss.xml"
                    regexp: true
                    code: 301
                # Posts NOT kept in the archive: send to the archive index.
                '^/(curl-http-request|swfield-seeking-co-maintainers|drupal7-select-all-nodes-that-are-children-in-a-book-and-whose-root-parent-is-of-a-specific-type|qualtrics-module|drush-multi-site-and-sites-php|ssl-proxy-module-d6-and-d7-versions-out)/[0-9]{4}/[0-9]{2}/[0-9]{2}/?$':
                    to: "https://www.{default}/writing/archive/"
                    regexp: true
                    code: 301
                # Kept posts: /slug/YYYY/MM/DD/ → /writing/archive/slug/
                '^/([a-z0-9-]+)/[0-9]{4}/[0-9]{2}/[0-9]{2}/?$':
                    to: "https://www.{default}/writing/archive/$1/"
                    regexp: true
                    code: 301

    "https://{default}/":
        type: redirect
        to: "https://www.{default}/"
