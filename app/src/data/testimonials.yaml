# LinkedIn recommendations (verbatim quotes; `weight` drives display order,
# the home page features the top three). Recommendations set to "Off" on
# LinkedIn are deliberately not included here.
- id: robert-douglass
  author: Robert Douglass
  role: Drupal pioneer
  company: formerly Platform.sh
  weight: 1
  quote:
    en: >-
      I've known Vinnie for a long time and in multiple roles. First, he was
      an early key customer of Platform.sh and was my technical counterpart
      as we sold and onboarded his team. From that I learned that he had
      superior technical understanding of what we were doing, and also the
      people skills to navigate enterprise procurement and change management.
    it: >-
      Conosco Vinnie da molto tempo e in ruoli diversi. All'inizio è stato
      uno dei primi clienti chiave di Platform.sh e il mio interlocutore
      tecnico mentre vendevamo e facevamo onboarding del suo team. Da lì ho
      capito che aveva una comprensione tecnica superiore di ciò che
      facevamo, oltre alle doti umane per orientarsi tra procurement
      enterprise e gestione del cambiamento.

- id: andrea-wagner
  author: Andrea Wagner
  role: Front-end Engineer
  company: British Council
  weight: 2
  quote:
    en: >-
      As a front-end engineer, I had the opportunity to work alongside
      Vincenzo for 5 years at the British Council. I found Vincenzo to be a
      talented architect who led global digital projects from architecture
      to development and implementation. Vincenzo led the development team
      that delivered 110 multilingual country-based websites and in addition
      13 white-labels campaign websites. Vincenzo's communication and
      leadership helped me to adjust quickly to the development workflow
      implemented by him, making the development team experience efficient,
      a marked change from other projects I have been involved in.
    it: >-
      Come front-end engineer ho avuto l'opportunità di lavorare accanto a
      Vincenzo per 5 anni al British Council. Ho trovato in lui un architetto
      di talento, che ha guidato progetti digitali globali dall'architettura
      allo sviluppo e all'implementazione. Vincenzo ha guidato il team che ha
      consegnato 110 siti nazionali multilingue, più 13 siti campagna
      white-label. La sua comunicazione e la sua leadership mi hanno aiutata
      ad ambientarmi rapidamente nel flusso di sviluppo da lui impostato,
      rendendo l'esperienza del team efficiente — un netto cambiamento
      rispetto ad altri progetti in cui sono stata coinvolta.

- id: anna-coppola
  author: Anna Coppola
  role: Senior UX Architect and Manager
  company: The Economist
  weight: 3
  quote:
    en: >-
      Vincenzo is an excellent professional that takes the time to understand
      the needs of the business and balances that with the expectations of
      the end users. He is constantly researching new technologies and makes
      constant recommendations on how to best utilize emerging ideas and
      tools. I greatly appreciate his ability to share his knowledge and
      extensive experience with non technical team members and his ability
      at keeping the User Experience in sight while focusing on the details
      for his job. Vincenzo is a pleasure to work with and make the workplace
      a nice environment, I have been very lucky to work with Vincenzo and I
      highly recommend him.
    it: >-
      Vincenzo è un professionista eccellente che si prende il tempo di
      capire le esigenze del business bilanciandole con le aspettative degli
      utenti finali. Studia costantemente nuove tecnologie e suggerisce come
      sfruttare al meglio idee e strumenti emergenti. Apprezzo molto la sua
      capacità di condividere conoscenza ed esperienza con i colleghi non
      tecnici e di tenere d'occhio la User Experience anche mentre cura i
      dettagli del suo lavoro. Lavorare con Vincenzo è un piacere e rende
      l'ambiente di lavoro migliore; sono stata molto fortunata a lavorare
      con lui e lo raccomando caldamente.

- id: mark-schaschke
  author: Mark Schaschke
  role: Delivery Manager
  company: ibuildings
  weight: 4
  quote:
    en: >-
      Vincenzo is one of those rare people who can focus on the details and
      the conceptual with equal facility. He seeks to understand technical
      problems completely and has an amazing ability to become an expert at
      something very quickly. Regardless of the complexities, he is always
      capable of explaining things in a way that makes sense to the audience,
      whether that audience is his team, the project manager, or the
      customer. He is a confident leader, and is well respected and liked by
      everyone he works with. It would be great to work with Vincenzo again,
      and I would recommend him to anyone seeking a technical leader or
      senior software engineer.
    it: >-
      Vincenzo è una di quelle rare persone capaci di concentrarsi con uguale
      facilità sui dettagli e sui concetti. Cerca di comprendere i problemi
      tecnici fino in fondo e ha una capacità sorprendente di diventare
      rapidamente esperto di qualcosa. Qualunque sia la complessità, sa
      sempre spiegare le cose in modo comprensibile per chi ascolta: il suo
      team, il project manager o il cliente. È un leader sicuro, rispettato
      e benvoluto da tutti quelli con cui lavora. Sarebbe bello lavorare di
      nuovo con lui, e lo raccomanderei a chiunque cerchi un technical leader
      o un senior software engineer.

