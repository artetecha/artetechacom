- id: gabriel-sambarino
  author: Gabriel Sambarino
  role: Senior IT Consultant
  weight: 6
  quote:
    en: >-
      Vincenzo's strongest skills are his deep and broad experience with API
      architectures, and overall a solid way to bring many implementation
      aspects into a higher, architectural perspective. He thrives as
      Project Lead. His thoroughness, his thought processes, his experience
      and insights can be something to rely on.
    it: >-
      I punti di forza di Vincenzo sono la sua esperienza profonda e ampia
