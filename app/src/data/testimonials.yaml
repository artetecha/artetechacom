- id: john-peden
  author: John Peden
  role: WordPress Consultant
  company: British Council
  quote:
    en: >-
      Vincenzo's knowledge of enterprise-level Drupal and WordPress systems is
      vast. His technical expertise proved invaluable throughout my project
      with the British Council and he's been a friendly and enjoyable guy to
      work with. Highly recommended.
    it: >-
      La conoscenza che Vincenzo ha dei sistemi Drupal e WordPress a livello
      enterprise è vastissima. La sua competenza tecnica si è rivelata
      preziosa per tutto il mio progetto con il British Council, ed è stato un
      collega cordiale e piacevole. Assolutamente consigliato.

- id: anna-coppola
  author: Anna Coppola
  role: Senior UX Architect and Manager
  company: The Economist
  quote:
    en: >-
      Vincenzo is an excellent professional who takes the time to understand
      the needs of the business and balances that with the expectations of the
      end users. He is constantly researching new technologies and makes
      constant recommendations on how to best utilise emerging ideas and
      tools. I greatly appreciate his ability to share his knowledge and
      extensive experience with non-technical team members. Vincenzo is a
      pleasure to work with.
    it: >-
      Vincenzo è un professionista eccellente che si prende il tempo di capire
      le esigenze del business bilanciandole con le aspettative degli utenti
      finali. Studia costantemente nuove tecnologie e suggerisce come
      sfruttare al meglio idee e strumenti emergenti. Apprezzo molto la sua
      capacità di condividere conoscenza ed esperienza con i colleghi non
      tecnici. Lavorare con Vincenzo è un piacere.

- id: mark-schaschke
  author: Mark Schaschke
  role: Delivery Manager
  company: ibuildings
  quote:
    en: >-
      Vincenzo is one of those rare people who can focus on the details and
      the conceptual with equal facility. He seeks to understand technical
      problems completely and has an amazing ability to become an expert at
      something very quickly. Regardless of the complexities, he is always
      capable of explaining things in a way that makes sense to the audience,
      whether that audience is his team, the project manager, or the customer.
    it: >-
      Vincenzo è una di quelle rare persone capaci di concentrarsi con uguale
      facilità sui dettagli e sui concetti. Cerca di comprendere i problemi
      tecnici fino in fondo e ha una capacità sorprendente di diventare
      rapidamente esperto di qualcosa. Qualunque sia la complessità, sa sempre
      spiegare le cose in modo comprensibile per chi ascolta: il suo team, il
      project manager o il cliente.

- id: aris-karidis
  author: Aris Karidis
  role: Web Development Manager
  company: Ladbrokes
  quote:
    en: >-
      Vincenzo is an excellent developer with expert knowledge of PHP and with
      very good understanding of programming & design concepts. He sees the
      bigger picture and can think in a conceptual way, beyond the immediate
      scope of a project. He was at Ladbrokes for several months and he is one
      of the very few consultants I worked with that I would hire with no
      second thought.
    it: >-
      Vincenzo è uno sviluppatore eccellente, con una conoscenza esperta di
      PHP e un'ottima padronanza dei concetti di programmazione e design. Vede
      il quadro d'insieme e sa ragionare in modo concettuale, oltre l'ambito
      immediato di un progetto. È stato a Ladbrokes per diversi mesi ed è uno
      dei pochissimi consulenti con cui ho lavorato che assumerei senza
      pensarci due volte.
