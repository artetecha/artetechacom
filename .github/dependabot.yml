version: 2
updates:
- package-ecosystem: npm
  directory: "/app"
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  groups:
    astro:
      patterns:
        - "astro"
        - "@astrojs/*"
  ignore:
    # @astrojs/check pins typescript to ^5 || ^6; majors beyond that break
    # the build (ERESOLVE). Revisit when Astro's tooling supports newer TS.
    - dependency-name: "typescript"
      update-types: ["version-update:semver-major"]
